<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Breaker - Main Menu</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
     background: url("mainmenu.png") center / cover no-repeat, #111;
    color: #000000;
    font-family: Arial, sans-serif;
  }

  .menu { text-align: center; }
  .menu h1 {
    font-family: 'Arial Black', 'Arial Bold', Gadget, sans-serif;
    font-weight: 900;
    font-size: 3.4rem;
    margin-bottom: 0.25rem;
    color: #0f5218;
    letter-spacing: 6px;
    -webkit-text-stroke: 2px #000;
  }
  .menu p.tagline { margin-top: 0; margin-bottom: 2.5rem; color: #000000; font-size: 1.5rem; }

  .menu button {
    display: block;
    width: 220px;
    margin: 0.75rem auto;
    padding: 0.9rem 0;
    font-size: 1.6rem;
    cursor: pointer;
    background: #0f5218;
    color: #000000;
    border: 2px solid #000000;
    border-radius: 6px;
    letter-spacing: 1px;
    transition: background 0.15s, border-color 0.15s;
  }
  .menu button:hover {
    background: #2a2a2a;
    border-color: #1d1c1c;
  }
  .menu button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    border-color: #6b5500;
  }

</style>
</head>
<body>

  <div class="menu">
    <h1>ROCK BREAKER</h1>
    <p class="tagline">Click the rock. Collect the shards.</p>

    <button id="playBtn">Play</button>

  </div>

  <script>
    document.getElementById("playBtn").addEventListener("click", function () {
      window.location.href = "game.html";
    });
  </script>

</body>
</html>
