<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Breaker - Main Menu</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #222;
    color: #ffffff;
    font-family: Arial, sans-serif;
  }

  .menu { text-align: center; }
  .menu h1 { font-size: 3rem; margin-bottom: 0.25rem; }
  .menu p.tagline { margin-top: 0; margin-bottom: 2.5rem; color: #aaa; }

  .menu button {
    display: block;
    width: 220px;
    margin: 0.75rem auto;
    padding: 0.9rem 0;
    font-size: 1.1rem;
    cursor: pointer;
    background: #444;
    color: #eee;
    border: 2px solid #666;
    border-radius: 6px;
  }
  .menu button:hover { background: #555; }
  .menu button:disabled { opacity: 0.4; cursor: not-allowed; }

</style>
</head>
<body>

  <div class="menu">
    <h1>ROCK BREAKER</h1>
    <p class="tagline">Click the rock. Collect the shards.</p>

    <button id="playBtn">Play</button>
    <button disabled>Settings</button>

  </div>

  <script>
    document.getElementById("playBtn").addEventListener("click", function () {
      window.location.href = "game.html";
    });
  </script>

</body>
</html>
