<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Breaker - Main Menu</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .menu { text-align: center; }
  .menu h1 { font-size: 3rem; margin-bottom: 0.25rem; }

  .menu button {
    display: block;
    width: 220px;
    margin: 0.75rem auto;
    font-size: 1.1rem;
  }

</style>
</head>
<body>

  <div class="menu">
    <h1>ROCK BREAKER</h1>
    <p class="tagline">Click the rock. Collect the shards.</p>

    <button id="playBtn">Play</button>
    <button disabled>Settings</button>

  </div>

  <script>
    document.getElementById("playBtn").addEventListener("click", function () {
      window.location.href = "game.html";
    });
  </script>

</body>
</html>
