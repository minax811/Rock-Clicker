<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Breaker - Game</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    background: #222;
    color: #eee;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  #sidebar {
    width: 240px;
    background: #2b2b2b;
    border-right: 2px solid #444;
    padding: 16px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  #sidebar h2 {
    margin: 0 0 6px 0;
    font-size: 1.2rem;
    text-align: center;
    letter-spacing: 2px;
  }

  .upgrade {
    background: #383838;
    border: 2px solid #555;
    border-radius: 6px;
    padding: 10px;
  }

  .upgrade .name { font-weight: bold; }
  .upgrade .cost { color: #aaa; font-size: 0.85rem; margin-top: 4px; }
  .upgrade.locked { opacity: 0.45; }

  .divider {
    border-top: 1px solid #555;
    margin: 8px 0 2px 0;
    padding-top: 8px;
    text-align: center;
    color: #aaa;
    font-size: 0.8rem;
    letter-spacing: 1px;
  }

  .upgrade.special { border-color: #7a6; }

  #backBtn {
    margin-top: auto;
    padding: 8px 0;
    background: #444;
    color: #eee;
    border: 2px solid #666;
    border-radius: 6px;
    cursor: pointer;
  }
  #backBtn:hover { background: #555; }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    position: relative;
  }

  #topbar {
    position: absolute;
    top: 16px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 40px;
    font-size: 1.1rem;
  }

  #healthWrap {
    width: 320px;
    background: #333;
    border: 2px solid #555;
    border-radius: 8px;
    height: 26px;
    overflow: hidden;
  }

  #healthFill {
    width: 100%;
    height: 100%;
    background: #c33;
  }

  #rock {
    width: 260px;
    height: 240px;
    background: #777;
    border: 3px solid #999;
    border-radius: 48% 52% 55% 45% / 50% 45% 55% 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    color: #ddd;
    cursor: pointer;
    user-select: none;
  }

</style>
</head>
<body>

  <div id="sidebar">
    <h2>UPGRADES</h2>

    <div class="upgrade">
      <div class="name">Pickaxe 1</div>
      <div class="cost">Cost: ??? shards</div>
    </div>
    <div class="upgrade locked">
      <div class="name">Pickaxe 2</div>
      <div class="cost">Cost: ??? shards</div>
    </div>
    <div class="upgrade locked">
      <div class="name">Pickaxe 3</div>
      <div class="cost">Cost: ??? shards</div>
    </div>
    <div class="upgrade locked">
      <div class="name">Pickaxe 4</div>
      <div class="cost">Cost: ??? shards</div>
    </div>
    <div class="upgrade locked">
      <div class="name">Pickaxe 5</div>
      <div class="cost">Cost: ??? shards</div>
    </div>

    <div class="divider">SPECIAL</div>

    <div class="upgrade special locked">
      <div class="name">Nuclear Decay</div>
      <div class="cost">Unlocks at ??? shards</div>
    </div>

    <button id="backBtn" onclick="window.location.href='index.html'">Back to Menu</button>
  </div>

  <div id="main">
    <div id="topbar">
      <span>Shards: 0</span>
      <span>Hits: 0</span>
    </div>

    <div id="healthWrap">
      <div id="healthFill"></div>
    </div>

    <div id="rock">ROCK</div>
  </div>

</body>
</html>
